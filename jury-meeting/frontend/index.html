<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decision Harness — Jury Call</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html,body{ background:#0a0a0a; overflow:hidden; height:100%; }
    .gallery{ display:grid; gap:10px; }
    /* speaker = bright green frame, exactly like the reference */
    .speaking{ outline:4px solid #36e36b !important; outline-offset:-4px; z-index:2; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useRef } = React;
    const API = "http://localhost:8000";

    // Zoom-style tile: a flat navy rectangle with the name centered. Speaker gets
    // a green frame. A tiny muted-mic glyph sits in the bottom-left like real Zoom.
    function Tile({ name, role, speaking, you, recording }) {
      const muted = you && !recording;
      return (
        <div className={"relative rounded-xl overflow-hidden w-full h-full flex flex-col items-center justify-center "+(speaking?"speaking":"")}
             style={{ background: "linear-gradient(135deg,#2b3a5c 0%,#1b2740 100%)" }}>
          <span className="text-white font-medium tracking-wide"
                style={{ fontSize:"clamp(20px,2.4vw,34px)" }}>{name}</span>
          {role && <span className="text-slate-300/80 mt-1" style={{ fontSize:"clamp(11px,1vw,14px)" }}>{role}</span>}
          <span className="absolute bottom-3 left-3 text-lg" style={{color: muted?"#f04747":"#36e36b"}}>
            {muted ? "🔇" : "🎤"}
          </span>
        </div>
      );
    }

    function App() {
      const [data, setData] = useState(null);
      const [started, setStarted] = useState(false);
      const [speaker, setSpeaker] = useState(null);
      const [busy, setBusy] = useState(false);
      const [recording, setRecording] = useState(false);
      const audioRef = useRef(new Audio());
      const recRef = useRef(null);
      const chunksRef = useRef([]);

      const playQueue = (turns, done) => {
        let i = 0;
        const next = () => {
          if (i >= turns.length) { setSpeaker(null); done && done(); return; }
          const t = turns[i++];
          setSpeaker(t.speaker);
          const a = audioRef.current;
          if (t.audio) { a.src = `${API}/audio/${t.audio}`; a.onended = next; a.play().catch(()=>setTimeout(next,2600)); }
          else setTimeout(next, Math.min(7000, 1800 + (t.text||"").length*28));
        };
        next();
      };

      const start = async () => {
        setBusy(true);
        const d = await (await fetch(`${API}/meeting/init`, {method:"POST",headers:{"Content-Type":"application/json"},body:"{}"})).json();
        setData(d); setStarted(true); setBusy(false);
        playQueue(d.openings || []);
      };

      const ask = async (q) => {
        if (!q || !q.trim() || busy) return;
        setBusy(true);
        const t = await (await fetch(`${API}/meeting/ask`, {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({question:q.trim()})})).json();
        setBusy(false); playQueue([t]);
      };

      const toggleMic = async () => {
        if (recording) { recRef.current && recRef.current.stop(); return; }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({audio:true});
          const mr = new MediaRecorder(stream); chunksRef.current = [];
          mr.ondataavailable = e => e.data.size && chunksRef.current.push(e.data);
          mr.onstop = async () => {
            stream.getTracks().forEach(t=>t.stop()); setRecording(false); setBusy(true);
            const fd = new FormData(); fd.append("audio", new Blob(chunksRef.current,{type:"audio/webm"}), "question.webm");
            try { const {text} = await (await fetch(`${API}/voice/transcribe`,{method:"POST",body:fd})).json();
                  setBusy(false); ask(text); } catch { setBusy(false); }
          };
          recRef.current = mr; mr.start(); setRecording(true);
        } catch { setRecording(false); }
      };

      const jurors = data?.jurors || [];
      const tiles = [{name:"You", role:data?.subject?.title||"Applicant", you:true, recording},
                     ...jurors.map(j=>({name:j.name, role:j.role}))];
      const cols = tiles.length<=2?2 : tiles.length<=6?3 : 4;

      if (!started) return (
        <div className="h-screen flex flex-col items-center justify-center text-center text-slate-100">
          <div className="text-5xl mb-4">⚖️</div>
          <h2 className="text-2xl font-semibold mb-1">Decision Harness — Jury Call</h2>
          <p className="text-slate-400 mb-6 max-w-md px-6">Join the room. The jury explains their decision out loud; hold the mic to ask anything.</p>
          <button onClick={start} disabled={busy} className="px-7 py-3 rounded-full bg-[#36e36b] hover:brightness-110 text-black font-semibold disabled:opacity-50">
            {busy?"Connecting…":"Join meeting"}</button>
        </div>
      );

      return (
        <div className="h-screen flex flex-col bg-black">
          {/* gallery — fills the screen, just like Zoom */}
          <div className="flex-1 p-3 min-h-0">
            <div className="gallery h-full" style={{gridTemplateColumns:`repeat(${cols},minmax(0,1fr))`}}>
              {tiles.map((t,i)=><Tile key={i} {...t} speaking={speaker===t.name} />)}
            </div>
          </div>

          {/* single mic control, centered, like the reference Audio button */}
          <div className="flex items-center justify-center pb-4 pt-1">
            <button onClick={toggleMic} disabled={busy && !recording} title="Tap to speak"
              className={"flex flex-col items-center justify-center w-16 h-16 rounded-2xl transition "+(recording?"bg-[#f04747]":"bg-[#3b4252] hover:bg-[#474f63]")}>
              <span className="text-2xl">{recording?"■":"🎤"}</span>
              <span className="text-[10px] text-white mt-0.5">{recording?"Stop":"Audio"}</span>
            </button>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
